<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bilibili_ask · 设置</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
    background: #f5f5f7;
    color: #333;
    max-width: 580px;
    margin: 0 auto;
    padding: 40px 20px 60px;
    min-height: 100vh;
    letter-spacing: .01em;
  }

  /* header */
  .page-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }
  .page-header__icon {
    width: 38px;
    height: 38px;
    border-radius: 11px;
    background: linear-gradient(135deg, #fb7299 0%, #ff8fb3 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .page-header__icon svg {
    width: 18px;
    height: 18px;
    fill: #fff;
  }
  .page-header h1 {
    font-size: 20px;
    font-weight: 620;
    color: #1a1a1a;
  }
  .page-subtitle {
    font-size: 13px;
    color: #999;
    margin-bottom: 28px;
    margin-left: 50px;
  }

  /* section card */
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 20px 22px;
    margin-bottom: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.03), 0 0 0 1px rgba(0,0,0,.03);
  }
  .card__title {
    font-size: 13px;
    font-weight: 650;
    color: #1a1a1a;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 7px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .card__title::before {
    content: '';
    width: 3px;
    height: 14px;
    border-radius: 2px;
    background: #fb7299;
  }

  /* form */
  .field {
    margin-bottom: 16px;
  }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 550;
    color: #555;
    margin-bottom: 6px;
  }
  .field input,
  .field textarea {
    width: 100%;
    padding: 10px 14px;
    background: #f5f5f7;
    border: 1.5px solid transparent;
    border-radius: 10px;
    font-size: 13.5px;
    font-family: inherit;
    color: #333;
    outline: none;
    transition: background .2s, border-color .2s;
    letter-spacing: .01em;
  }
  .field input:focus,
  .field textarea:focus {
    background: #fff;
    border-color: rgba(251,114,153,.25);
  }
  .field input[type="range"] {
    padding: 0;
    height: 4px;
    accent-color: #fb7299;
    background: transparent;
  }
  .field textarea {
    resize: vertical;
    min-height: 110px;
    font-size: 12.5px;
    line-height: 1.6;
  }
  .field .hint {
    font-size: 11px;
    color: #bbb;
    margin-top: 5px;
    line-height: 1.4;
  }

  /* range row */
  .range-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .range-row input[type="range"] { flex: 1; }
  .range-row .range-val {
    width: 42px;
    text-align: right;
    font-size: 13px;
    font-weight: 650;
    color: #fb7299;
    font-variant-numeric: tabular-nums;
    font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  }

  /* badge */
  .badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 5px;
    letter-spacing: .03em;
  }
  .badge--req { background: rgba(251,114,153,.1); color: #fb7299; }

  /* actions */
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .btn {
    padding: 11px 24px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 13.5px;
    font-weight: 600;
    transition: all .15s;
    letter-spacing: .02em;
  }
  .btn--primary {
    background: #fb7299;
    color: #fff;
    flex: 1;
    box-shadow: 0 2px 8px rgba(251,114,153,.2);
  }
  .btn--primary:hover { background: #ff5c85; }
  .btn--ghost {
    background: transparent;
    color: #888;
    border: 1.5px solid rgba(0,0,0,.06);
    padding: 11px 20px;
  }
  .btn--ghost:hover { background: rgba(0,0,0,.02); color: #555; }

  /* toast */
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 22px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 550;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
    letter-spacing: .01em;
  }
  .toast--show { opacity: 1; }
  .toast--ok  { background: #f6ffed; color: #52c41a; border: 1px solid rgba(82,196,26,.15); }
  .toast--err { background: #fff2f0; color: #e74c3c; border: 1px solid rgba(231,76,60,.1); }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-header__icon">
    <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
  </div>
  <h1>设置</h1>
</div>
<p class="page-subtitle">bilibili_ask API 配置</p>

<!-- API config -->
<div class="card">
  <div class="card__title">API 连接</div>

  <div class="field">
    <label>Base URL <span class="badge badge--req">必填</span></label>
    <input type="text" id="baseURL" placeholder="https://api.openai.com" autocomplete="off">
    <p class="hint">仅需填写域名，自动拼接 /v1/chat/completions。支持 OpenAI、DeepSeek、通义千问等</p>
  </div>

  <div class="field">
    <label>API Key <span class="badge badge--req">必填</span></label>
    <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
    <p class="hint">密钥仅保存在浏览器本地，不会上传到任何第三方</p>
  </div>

  <div class="field">
    <label>Model</label>
    <input type="text" id="model" placeholder="gpt-4o" autocomplete="off">
    <p class="hint">模型名，例如 gpt-4o / deepseek-chat / qwen-turbo</p>
  </div>
</div>

<!-- Advanced -->
<div class="card">
  <div class="card__title">高级参数</div>

  <div class="field">
    <label>Temperature</label>
    <div class="range-row">
      <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
      <span class="range-val" id="temperatureVal">0.7</span>
    </div>
    <p class="hint">回答创造性，0 = 精确确定，2 = 最大随机</p>
  </div>

  <div class="field">
    <label>Max Tokens</label>
    <input type="number" id="maxTokens" min="256" max="32768" step="256" placeholder="2048">
    <p class="hint">单次回答最大长度，256 ~ 32768</p>
  </div>

  <div class="field">
    <label>字幕上下文条数</label>
    <input type="number" id="subtitleContextCount" min="4" max="100" step="2" placeholder="20">
    <p class="hint">每次携带的附近字幕数量，越大越准确但 token 消耗更高</p>
  </div>
</div>

<!-- System prompt -->
<div class="card">
  <div class="card__title">系统提示词</div>

  <div class="field">
    <label>自定义 System Prompt</label>
    <textarea id="systemPrompt" placeholder="你是一个bilibili_ask助手..."></textarea>
    <p class="hint">定义 AI 的行为与风格。视频标题、简介、字幕会自动注入到上下文中</p>
  </div>
</div>

<div class="actions">
  <button class="btn btn--primary" id="saveBtn">保存设置</button>
  <button class="btn btn--ghost" id="resetBtn">恢复默认</button>
</div>

<div id="toast" class="toast"></div>

<script src="options.js"></script>
</body>
</html>
