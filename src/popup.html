<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B站视频助手</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #1e1e2e;
      color: #e0e0e0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #fb7299, #ff6b9d);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .header h1 {
      font-size: 16px;
      color: #fb7299;
    }
    .header .ver {
      font-size: 11px;
      color: #666;
      margin-left: auto;
    }

    .card {
      background: #2a2a3c;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .card__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card__label {
      font-size: 13px;
      color: #aaa;
    }
    .card__value {
      font-size: 13px;
      font-weight: 600;
    }
    .card__value--ok { color: #4caf50; }
    .card__value--warn { color: #ff9800; }
    .card__value--error { color: #f44336; }

    .toggle-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle-wrap span {
      font-size: 14px;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 46px;
      height: 26px;
      flex-shrink: 0;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle .slider {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #555;
      border-radius: 26px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider {
      background: #fb7299;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(20px);
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 10px 0;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      transition: all 0.15s;
      text-decoration: none;
      display: inline-block;
    }
    .btn--primary {
      background: #fb7299;
      color: #fff;
    }
    .btn--primary:hover { background: #ff5c85; }
    .btn--secondary {
      background: #33334a;
      color: #ccc;
    }
    .btn--secondary:hover { background: #3a3a54; }

    .divider {
      height: 1px;
      background: #33334a;
      margin: 14px 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🤖</div>
    <h1>B站视频助手</h1>
    <span class="ver">v1.0</span>
  </div>

  <div class="card">
    <div class="toggle-wrap">
      <span>悬浮按钮</span>
      <label class="toggle">
        <input type="checkbox" id="floatToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="card">
    <div class="card__row" style="margin-bottom:10px;">
      <span class="card__label">API 状态</span>
      <span class="card__value" id="apiStatus">检查中...</span>
    </div>
    <div class="card__row">
      <span class="card__label">当前页面</span>
      <span class="card__value" id="pageStatus">--</span>
    </div>
  </div>

  <div class="btn-row">
    <a class="btn btn--secondary" id="optionsLink" href="#">⚙️ 设置</a>
    <button class="btn btn--primary" id="openChatBtn">💬 打开对话</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
